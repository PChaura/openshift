apiVersion: v1
kind: Service
metadata:
  argocd.argoproj.io/sync-wave: "1"
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: mysite
spec:
  ports:
  - name: 8080-tcp
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    deployment: mysite
  sessionAffinity: None
  type: ClusterIP